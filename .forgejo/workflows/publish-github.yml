name: Publish to GitHub

on:
  workflow_dispatch:
  push:
    branches: [public-main] # Automates the push whenever you update the public branch

jobs:
  push-to-github:
    name: Sync Code to Public Repo
    runs-on: docker
    steps:
      - name: Checkout local repository
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          ref: public-main # Strictly check out the clean public branch

      - name: Push to GitHub
        shell: sh
        run: |
          # Add the GitHub remote using the PAT for authentication
          git remote add github https://steierma:${{ secrets.GHCR_PAT }}@github.com/steierma/cogni-cash.git
          
          # Push the local public-main branch to GitHub's main branch
          # Using --force ensures GitHub exactly mirrors this clean branch
          git push github public-main:main --force