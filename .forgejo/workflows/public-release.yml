name: Public Release

on:
  push:
    branches: [public-main]
    tags: ['v*']
  pull_request:
    branches: [public-main]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Go Tests
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Run tests and check coverage
        working-directory: backend
        shell: sh
        run: |
          go test ./... -v -count=1 -coverprofile=coverage.out
          
          # Exclude non-logic files (entities, ports, cmd/, migrations/, main.go) from coverage calculation
          grep -vE 'internal/domain/entity|internal/domain/port|cmd/|migrations/|main\.go' coverage.out > coverage_filtered.out
          
          TOTAL_COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (excluding non-logic files): $TOTAL_COVERAGE%"
          if [ "$(echo "$TOTAL_COVERAGE < 35" | awk '{print ($1 < 35)}')" -eq 1 ]; then
            echo "❌ Total coverage is below the temporarily enforced 35% threshold! Target is 75%."
            exit 1
          fi
          echo "✅ Total coverage requirement met."

          SERVICE_COVERAGE=$(go test ./internal/domain/service/... -cover | awk '{print $5}' | sed 's/%//')
          if [ -n "$SERVICE_COVERAGE" ]; then
            echo "Service layer coverage: $SERVICE_COVERAGE%"
            if [ "$(echo "$SERVICE_COVERAGE < 65" | awk '{print ($1 < 65)}')" -eq 1 ]; then
              echo "❌ Service layer coverage dropped below the enforced 65% threshold!"
              exit 1
            fi
            echo "✅ Service layer coverage requirement met."
          else
            echo "⚠️ Service layer coverage could not be determined."
          fi

