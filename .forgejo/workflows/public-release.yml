name: Public Release

on:
  push:
    branches: [public-main]

jobs:
  build-push:
    name: Build & Push Public Images
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Manual Checkout
        shell: sh
        run: |
          git clone --branch public-main http://192.168.20.53:3000/steierma/cogni-cash.git .

      - name: Get Version
        id: get_version
        shell: sh
        run: |
          VERSION=$(cat package.json | grep '"version":' | cut -d '"' -f 4)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Docker meta (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/steierma/cogni-cash-backend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.VERSION }}
            type=raw,value=${{ steps.get_version.outputs.VERSION }}-{{date 'YYYYMMDD'}}

      - name: Docker meta (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/steierma/cogni-cash-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.VERSION }}
            type=raw,value=${{ steps.get_version.outputs.VERSION }}-{{date 'YYYYMMDD'}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: steierma
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  # Mirror to GitHub repository itself (tags and code)
  sync-to-github:
    name: Sync to GitHub Repo
    needs: build-push
    runs-on: docker
    steps:
      - name: Manual Checkout
        shell: sh
        run: |
          git clone --branch public-main http://192.168.20.53:3000/steierma/cogni-cash.git .

      - name: Push to GitHub
        shell: sh
        run: |
          git remote add github https://steierma:${{ secrets.GHCR_PAT }}@github.com/steierma/cogni-cash.git
          git push github public-main:main --follow-tags --force
