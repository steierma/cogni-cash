server {
    listen 80;
    client_max_body_size 32M;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "0"                               always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    # HSTS — tells browsers to only connect over HTTPS for 1 year.
    # Remove if you are NOT behind TLS termination.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — lock down resource origins to self.
    # 'unsafe-inline' for styles is required by Tailwind CSS v4's runtime.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Proxy API calls to the backend ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;
        # Support long-running requests (e.g. file imports)
        proxy_read_timeout 120s;
    }

    # ── Health endpoint ───────────────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply nosniff — add_header is not inherited inside nested locations.
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── SPA fallback — route everything else to index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
