name: CI / CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Go Tests
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Run tests and check coverage
        working-directory: backend
        shell: sh
        run: |
          go test ./... -v -count=1 -coverprofile=coverage.out
          
          # Exclude non-logic files (entities, ports, cmd/, migrations/, main.go) and memory adapters from coverage calculation
          grep -vE 'internal/domain/entity|internal/domain/port|cmd/|migrations/|main\.go|internal/adapter/repository/memory' coverage.out > coverage_filtered.out
          
          TOTAL_COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (excluding non-logic files): $TOTAL_COVERAGE%"
          if [ "$(echo "$TOTAL_COVERAGE < 35" | awk '{print ($1 < 35)}')" -eq 1 ]; then
            echo "❌ Total coverage is below the temporarily enforced 35% threshold! Target is 75%."
            exit 1
          fi
          echo "✅ Total coverage requirement met."

          SERVICE_COVERAGE=$(go test ./internal/domain/service/... -cover | awk '{print $5}' | sed 's/%//')
          if [ -n "$SERVICE_COVERAGE" ]; then
            echo "Service layer coverage: $SERVICE_COVERAGE%"
            if [ "$(echo "$SERVICE_COVERAGE < 65" | awk '{print ($1 < 65)}')" -eq 1 ]; then
              echo "❌ Service layer coverage dropped below the enforced 65% threshold!"
              exit 1
            fi
            echo "✅ Service layer coverage requirement met."
          else
            echo "⚠️ Service layer coverage could not be determined."
          fi

  # ── 2. Deploy (Internal) ──────────────────────────────────────────────────
  # This job now builds LOCAL images for your Proxmox server instead of pushing to GHCR
  deploy:
    name: Deploy to Proxmox
    runs-on: docker
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Load Deploy Key
        shell: sh
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install rsync on Runner
        shell: sh
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk update && apk add --no-cache rsync
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y rsync
          else
            echo "⚠️ Could not determine package manager to install rsync on runner."
          fi

      - name: Sync Source & Rebuild on Server
        shell: sh
        run: |
          # Sync only what we need to build and run the services
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='enable-banking.pem' \
            --exclude='enable-banking-prod.pem' \
            --exclude='docker-compose.override.yml' \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='mobile/' \
            --exclude='mobile_hermit/' \
            --exclude='pentest/' \
            --exclude='backups/' \
            --exclude='screenshots/' \
            --exclude='tmp/' \
            --exclude='backend/bin/' \
            --exclude='frontend/node_modules/' \
            --exclude='frontend/dist/' \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

          # Rebuild and restart locally
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            
            # Build and restart locally (no GHCR pull needed for internal dev)
            docker compose up -d --build --remove-orphans
          EOF
