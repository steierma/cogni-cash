  # ── 4. Build & Push Docker images ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Docker meta (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/steierma/cogni-cash-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Docker meta (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/steierma/cogni-cash-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: |
            /tmp/.buildx-cache-backend
            /tmp/.buildx-cache-frontend
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: steierma
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-backend
          cache-to: type=local,dest=/tmp/.buildx-cache-backend-new,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-frontend
          cache-to: type=local,dest=/tmp/.buildx-cache-frontend-new,mode=max

      - name: Move cache
        shell: sh
        run: |
          rm -rf /tmp/.buildx-cache-backend
          rm -rf /tmp/.buildx-cache-frontend
          mv /tmp/.buildx-cache-backend-new /tmp/.buildx-cache-backend
          mv /tmp/.buildx-cache-frontend-new /tmp/.buildx-cache-frontend

  # ── 5. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Proxmox
    runs-on: docker
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Install SSH client & rsync on Runner
        run: |
          apt-get update
          apt-get install -y openssh-client rsync

      - name: Load Deploy Key into Runner
        shell: sh
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Targeted Sync of Configuration
        shell: sh
        run: |
          # We only need docker-compose.yml on the server.
          # Everything else (backend, frontend, migrations) is inside the Docker images.
          # Files like .env, docker-compose.override.yml, and keys are already on the server.
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Pull images & start stack
        shell: sh
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -euo pipefail
          
            echo ">>> Authenticating with GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u steierma --password-stdin
          
            echo ">>> Pulling latest images from GHCR..."
            cd "${{ secrets.DEPLOY_PATH }}"
          
            # Use docker compose pull to update images without affecting existing config files
            docker compose pull
          
            echo ">>> Starting stack..."
            # Note: We assume .env and docker-compose.override.yml are already present on the server.
            # If backend/.env is missing but root .env exists, we link/copy it for the postgres service.
            if [ ! -f backend/.env ] && [ -f .env ]; then
              mkdir -p backend
              cp .env backend/.env
              echo "✅ Ensured backend/.env for postgres service"
            fi
          
            docker compose up -d --remove-orphans
          
            echo ">>> Waiting for backend health..."
            for i in $(seq 1 30); do
              health_status=$(docker inspect --format='{{.State.Health.Status}}' cogni-cash-backend 2>/dev/null || echo "missing")
              if [ "$health_status" = "healthy" ]; then
                echo "✅ Backend is healthy"
                break
              fi
              echo "  [$i/30] status=$health_status — waiting..."
              sleep 3
            done
            docker compose ps
          EOF