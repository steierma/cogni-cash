name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Go Tests
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        shell: sh
        run: go test ./... -v -count=1

  # ── 2. Build & Push Docker images ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: steierma
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/steierma/cogni-cash-backend:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/steierma/cogni-cash-frontend:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        shell: sh
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ── 3. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Proxmox
    runs-on: docker
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Install SSH client & rsync on Runner
        run: |
          apt-get update
          apt-get install -y openssh-client rsync

      - name: Load Deploy Key into Runner
        shell: sh
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync project files
        shell: sh
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='docker-compose.override.yml' \
            --exclude='enable-banking.pem' \
            --exclude='backend/balance/diba_history' \
            --exclude='backend/balance/bulk_import' \
            --exclude='backend/bin' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Pull images & start stack
        shell: sh
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -euo pipefail
          
            echo ">>> Authenticating with GHCR..."
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u steierma --password-stdin
          
            echo ">>> Pulling latest images from GHCR..."
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull
          
            echo ">>> Starting stack..."
            if [ ! -f backend/.env ] && [ -f .env ]; then
              cp .env backend/.env
              echo "✅ Copied root .env to backend/.env"
            fi
          
            docker compose up -d --remove-orphans
          
            echo ">>> Waiting for backend health..."
            for i in $(seq 1 30); do
              health_status=$(docker inspect --format='{{.State.Health.Status}}' cogni-cash-backend 2>/dev/null || echo "missing")
              if [ "$health_status" = "healthy" ]; then
                echo "✅ Backend is healthy"
                break
              fi
              echo "  [$i/30] status=$health_status — waiting..."
              sleep 3
            done
            docker compose ps
          EOF